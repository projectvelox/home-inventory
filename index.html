<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- ── Primary SEO ─────────────────────────────────────────── -->
    <title>My Home Haven — Household Inventory Tracker</title>
    <meta name="description" content="Keep your home perfectly stocked. Track pantry items, household supplies, and expiry dates — and generate shopping lists in seconds." />
    <meta name="keywords" content="home inventory, pantry tracker, household supplies, shopping list, expiry tracker" />
    <meta name="author" content="My Home Haven" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- ── Icons ──────────────────────────────────────────────── -->
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/icon-512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- ── PWA ────────────────────────────────────────────────── -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#fb7185" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Home Haven" />

    <!-- ── Open Graph (iMessage / WhatsApp / Slack link previews) -->
    <meta property="og:type"         content="website" />
    <meta property="og:site_name"    content="My Home Haven" />
    <meta property="og:title"        content="My Home Haven — Household Inventory Tracker" />
    <meta property="og:description"  content="Keep your home perfectly stocked. Track pantry items, household supplies, and expiry dates — and generate shopping lists in seconds." />
    <meta property="og:image"        content="/icon-512.png" />
    <meta property="og:image:width"  content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt"    content="My Home Haven app icon" />

    <!-- ── Twitter card ──────────────────────────────────────── -->
    <meta name="twitter:card"        content="summary" />
    <meta name="twitter:title"       content="My Home Haven" />
    <meta name="twitter:description" content="Keep your home perfectly stocked." />
    <meta name="twitter:image"       content="/icon-512.png" />

    <!-- ── Fonts — self-hosted for fast LCP (no Google Fonts round-trips) ── -->
    <!-- Preload: browser fetches these with the HTML before JS even runs  -->
    <link rel="preload" href="/fonts/pacifico.woff2"               as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/plus-jakarta-sans.woff2"      as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/plus-jakarta-sans-italic.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="dns-prefetch" href="//world.openfoodfacts.org" />
    <link rel="dns-prefetch" href="//api.upcitemdb.com" />
    <style>
      @font-face {
        font-family: 'Pacifico';
        src: url('/fonts/pacifico.woff2') format('woff2');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        src: url('/fonts/plus-jakarta-sans.woff2') format('woff2');
        font-weight: 100 900;
        font-style: normal;
        font-display: swap;
      }
      @font-face {
        font-family: 'Plus Jakarta Sans';
        src: url('/fonts/plus-jakarta-sans-italic.woff2') format('woff2');
        font-weight: 100 900;
        font-style: italic;
        font-display: swap;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
