  <rect x="630" y="107" width="104" height="38" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" rx="5"/>
  <text x="682" y="123" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#15803d">Locations</text>
  <text x="682" y="136" text-anchor="middle" font-size="7.5" fill="#64748b">Storage rooms</text>

  <!-- View boxes: row 2 -->
  <rect x="333" y="153" width="90" height="38" fill="#fefce8" stroke="#facc15" stroke-width="1.5" rx="5"/>
  <text x="378" y="169" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#854d0e">Expiry</text>
  <text x="378" y="182" text-anchor="middle" font-size="7.5" fill="#64748b">Calendar groups</text>

  <rect x="432" y="153" width="90" height="38" fill="#faf5ff" stroke="#c084fc" stroke-width="1.5" rx="5"/>
  <text x="477" y="169" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#7e22ce">Wishlist</text>
  <text x="477" y="182" text-anchor="middle" font-size="7.5" fill="#64748b">Priority items</text>

  <rect x="531" y="153" width="90" height="38" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" rx="5"/>
  <text x="576" y="169" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#15803d">Tasks</text>
  <text x="576" y="182" text-anchor="middle" font-size="7.5" fill="#64748b">Recurring chores</text>

  <rect x="630" y="153" width="104" height="38" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="5"/>
  <text x="682" y="169" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#475569">Help</text>
  <text x="682" y="182" text-anchor="middle" font-size="7.5" fill="#64748b">EN / Tagalog</text>

  <!-- Helper views label -->
  <text x="333" y="210" font-size="8.5" font-weight="bold" fill="#15803d">Helper Views  (2)</text>
  <rect x="333" y="216" width="90" height="38" fill="#f0fdf4" stroke="#4ade80" stroke-width="1.5" rx="5"/>
  <text x="378" y="232" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#15803d">Tasks</text>
  <text x="378" y="245" text-anchor="middle" font-size="7.5" fill="#64748b">Assigned only</text>

  <rect x="432" y="216" width="90" height="38" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5" rx="5"/>
  <text x="477" y="232" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#475569">Help</text>
  <text x="477" y="245" text-anchor="middle" font-size="7.5" fill="#64748b">EN / Tagalog</text>

  <!-- Modals section -->
  <line x1="333" y1="268" x2="734" y2="268" stroke="#e2e8f0" stroke-width="1"/>
  <text x="333" y="284" font-size="8.5" font-weight="bold" fill="#475569">Overlays  &amp;  Modals  (always available to Admin)</text>

  <rect x="333" y="291" width="95" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="380" y="305" text-anchor="middle" font-size="8" fill="#334155">ItemModal</text>
  <text x="380" y="317" text-anchor="middle" font-size="7" fill="#94a3b8">Create / Edit item</text>

  <rect x="437" y="291" width="95" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="484" y="305" text-anchor="middle" font-size="8" fill="#334155">BarcodeScanner</text>
  <text x="484" y="317" text-anchor="middle" font-size="7" fill="#94a3b8">Camera decode</text>

  <rect x="541" y="291" width="95" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="588" y="305" text-anchor="middle" font-size="8" fill="#334155">BulkImport</text>
  <text x="588" y="317" text-anchor="middle" font-size="7" fill="#94a3b8">CSV upload</text>

  <rect x="645" y="291" width="89" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="689" y="305" text-anchor="middle" font-size="8" fill="#334155">ShareModal</text>
  <text x="689" y="317" text-anchor="middle" font-size="7" fill="#94a3b8">Token generate</text>

  <rect x="333" y="334" width="95" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="380" y="348" text-anchor="middle" font-size="8" fill="#334155">CategoryModal</text>
  <text x="380" y="360" text-anchor="middle" font-size="7" fill="#94a3b8">Add category</text>

  <rect x="437" y="334" width="95" height="34" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1" rx="4"/>
  <text x="484" y="348" text-anchor="middle" font-size="8" fill="#334155">LocationsManager</text>
  <text x="484" y="360" text-anchor="middle" font-size="7" fill="#94a3b8">Add / delete</text>

  <rect x="541" y="334" width="242" height="34" fill="#f0fdf4" stroke="#4ade80" stroke-width="1" rx="4"/>
  <text x="662" y="348" text-anchor="middle" font-size="8" fill="#166534">SharedView  (public, no auth required)</text>
  <text x="662" y="360" text-anchor="middle" font-size="7" fill="#94a3b8">Read-only shopping list via share token</text>

  <rect x="333" y="377" width="401" height="22" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1" rx="4"/>
  <text x="533" y="392" text-anchor="middle" font-size="7.5" fill="#64748b">AI Scan button inside ItemModal  →  POST /api/scan  →  Claude Haiku Vision  →  auto-fills name / unit / notes</text>
</svg>
