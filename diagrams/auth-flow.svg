  <text x="533" y="70" text-anchor="middle" font-size="9.5" font-weight="bold" fill="white" letter-spacing="1">INVENTORY APP  —  VIEWS  &amp;  MODALS</text>

  <!-- Admin views label -->
  <text x="333" y="100" font-size="8.5" font-weight="bold" fill="#1e40af">Admin Views  (8)</text>

  <!-- View boxes: row 1 -->
  <rect x="333" y="107" width="90" height="38" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" rx="5"/>
  <text x="378" y="123" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1e40af">Dashboard</text>
  <text x="378" y="136" text-anchor="middle" font-size="7.5" fill="#64748b">Stats + charts</text>

  <rect x="432" y="107" width="90" height="38" fill="#eff6ff" stroke="#60a5fa" stroke-width="1.5" rx="5"/>
  <text x="477" y="123" text-anchor="middle" font-size="8.5" font-weight="bold" fill="#1e40af">Inventory</text>
